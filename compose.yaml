services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: spreadsheet_example_flask:latest
    ports:
      - "5000:5000"
    environment:
      FLASK_APP: app.py
      FLASK_ENV: development
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./:/app
    command: flask run --host=0.0.0.0 --port=5000